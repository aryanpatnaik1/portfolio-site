<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Minimalist</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<canvas id="ambient-canvas"></canvas>
<body data-theme="light">
    <div id="scroll-progress"></div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="#hero-target" class="logo">Aryan</a>
            <ul class="nav-links">
                <li><a href="#projects">Work</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
                <li><button id="theme-toggle" class="icon-btn">🌓</button></li>
                <li><button id="ambient-toggle" class="icon-btn" title="Toggle Ambient Background">✨</button></li>
            </ul>
        </div>
    </nav>

    <main>
        <section class="hero" id="hero-target"></section>
        <section class="section" id="projects">
            <h2 class="section-label">Selected Work</h2>
            <div class="projects-grid" id="projects-target"></div>
        </section>
        <section class="section" id="about">
            <h2 class="section-label">Background</h2>
            <div id="about-target"></div>
        </section>
        <section class="section reveal" id="contact">
            <h2 class="section-label">Contact</h2>
            <div id="contact-target">
            </div>
</section>
    </main>
    

    <footer id="footer-target"></footer>

    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
